name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Rust fmt check
      run: cargo fmt --all -- --check

    - name: Rust clippy
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Rust test
      run: cargo test --all-targets --all-features

    - name: Install cargo-audit
      run: cargo install cargo-audit

    - name: Cargo audit
      run: cargo audit

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/uv
          nlp/.venv/
        key: ${{ runner.os }}-uv-${{ hashFiles('nlp/pyproject.toml', 'nlp/uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: Install dependencies
      working-directory: ./nlp
      run: uv sync --frozen

    - name: Python ruff check
      working-directory: ./nlp
      run: uv run ruff check .

    - name: Python ruff format check
      working-directory: ./nlp
      run: uv run ruff format --check .

    - name: Python test
      working-directory: ./nlp
      run: uv run pytest

  docker:
    name: Docker
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker images
      run: |
        docker build -t id-siber-api .
        docker build -t id-siber-nlp ./nlp

    - name: Test Docker compose
      run: |
        docker compose -f docker-compose.yml config
        docker compose -f docker-compose.override.yml.example config
