repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml
      - id: debug-statements

  - repo: local
    hooks:
      - id: rust-fmt
        name: rust fmt
        entry: cargo fmt
        language: system
        types: [rust]
        pass_filenames: false

      - id: rust-clippy
        name: rust clippy
        entry: cargo clippy -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-check
        name: cargo check
        entry: cargo check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-test
        name: cargo test
        entry: cargo test
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-audit
        name: cargo audit
        entry: cargo audit
        language: system
        types: [rust]
        pass_filenames: false
        files: Cargo\.lock$

      - id: cargo-deny
        name: cargo deny
        entry: cargo deny check
        language: system
        types: [rust]
        pass_filenames: false
        files: deny\.toml|Cargo\.lock$

      - id: python-ruff
        name: python ruff
        entry: ruff check --fix
        language: python
        types: [python]
        files: ^nlp/
        additional_dependencies: [ruff]
        require_serial: true

      - id: python-ruff-format
        name: python ruff format
        entry: ruff format
        language: python
        types: [python]
        files: ^nlp/
        additional_dependencies: [ruff]
        require_serial: true

      - id: python-black
        name: python black
        entry: black --check
        language: python
        types: [python]
        files: ^nlp/
        additional_dependencies: [black]
        require_serial: true
