# Cargo-deny configuration for security advisories

[advisories]
# List of advisory IDs to ignore. Note that ignored advisories will still
# output a note when they are encountered, unless they are also yanked.
ignore = [
    # RSA vulnerability in sqlx-mysql - we only use PostgreSQL
    # This is a transitive dependency that we don't directly control
    "RUSTSEC-2023-0071",
    # rustls-webpki wildcard name constraint bypass - transitive dep, upgrade pending upstream
    "RUSTSEC-2026-0099",
    # fxhash unmaintained - transitive dep via servo/selectors, no direct usage
    "RUSTSEC-2025-0057",
]

[licenses]
# Allow all licenses for development
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Unicode-DFS-2016", "CC0-1.0", "AGPL-3.0", "MPL-2.0", "OpenSSL", "BSL-1.0", "Zlib", "WTFPL", "Unlicense", "0BSD"]

[bans]
# Skip certain crates during duplicate detection
skip = [
    # Allow duplicate windows_* versions due to transitive dependencies
    { name = "windows_x86_64_msvc" },
    { name = "windows_x86_64_gnullvm" },
    { name = "windows_x86_64_gnu" },
    { name = "windows_i686_msvc" },
    { name = "windows_i686_gnu" },
    { name = "windows_aarch64_gnullvm" },
    { name = "windows_aarch64_msvc" },
    { name = "windows-targets" },
]

# Skip certain crates during version mismatch detection
skip-tree = []

[sources]
# Allow unknown registries
unknown-registry = "warn"
# Allow unknown git sources
unknown-git = "warn"
